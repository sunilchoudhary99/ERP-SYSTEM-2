<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ERP Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #4f46e5 0%, #075985 100%); height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .login-card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); background: #ffffff; }
        .btn-primary { background-color: #4f46e5; border: none; }
        .btn-primary:hover { background-color: #4338ca; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card login-card p-4 text-center" style="width: 420px;">
    <div class="mb-3 mt-2">
        <i class="fa-solid px-3 py-2 fa-rectangle-list text-white rounded-3 bg-primary fs-2"></i>
    </div>
    <h3 class="fw-bold text-dark">Welcome Back</h3>
    <p class="text-muted small">Enter your credentials to access the ERP Portal</p>

    <form id="loginForm" class="text-start mt-3">
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                <input type="text" id="username" class="form-control bg-light border-start-0" placeholder="e.g. admin123" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                <input type="password" id="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mt-2 shadow-sm">Sign In <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i></button>
    </form>
    <p class="mt-4 small text-muted">Don't have an admin account? <a href="/signup" class="text-decoration-none fw-semibold text-primary">Create One</a></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (response.ok) {
            window.location.href = '/dashboard';
        } else {
            alert("Error: Invalid Username or Password!");
        }
    });
</script>
</body>
</html>
