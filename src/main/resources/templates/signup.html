<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ERP Portal - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .signup-card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: #ffffff; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card signup-card p-4" style="width: 440px;">
    <h3 class="fw-bold text-dark text-center">Create Admin Account</h3>
    <p class="text-muted small text-center">Setup your ERP system control panel</p>

    <form id="signupForm" class="mt-3">
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Username</label>
            <input type="text" id="username" class="form-control bg-light" placeholder="Choose username" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Corporate Email</label>
            <input type="email" id="email" class="form-control bg-light" placeholder="name@company.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold text-secondary">Password</label>
            <input type="password" id="password" class="form-control bg-light" placeholder="Create strong password" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold mt-2 shadow-sm">Register Account</button>
    </form>
    <p class="mt-4 small text-muted text-center">Already registered? <a href="/login" class="text-decoration-none fw-semibold text-dark">Login here</a></p>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        const msg = await response.text();
        alert(msg);
        if (response.ok) window.location.href = '/login';
    });
</script>
</body>
</html>
